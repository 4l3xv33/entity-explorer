name: Update DHS UFLPA snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "27 10 * * *"

permissions:
  contents: write

jobs:
  update-dhs-uflpa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download DHS UFLPA Entity List HTML
        run: |
          set -euo pipefail
          mkdir -p data/snapshots

          node --input-type=module <<'NODE'
          import { writeFile } from "node:fs/promises";

          const url = "https://www.dhs.gov/uflpa-entity-list";
          const response = await fetch(url, {
            headers: {
              "accept": "text/html",
              "user-agent": "Mozilla/5.0 Entity Explorer snapshot updater"
            }
          });

          if (!response.ok) {
            throw new Error(`${url} returned HTTP ${response.status}`);
          }

          const html = await response.text();
          if (!html.includes("UFLPA Entity List") || !html.includes("Name of Entity")) {
            throw new Error("DHS UFLPA Entity List table marker was not found.");
          }

          await writeFile("data/snapshots/dhs-uflpa-entity-list.html", html);
          await writeFile("data/snapshots/dhs-uflpa-source-url.txt", `${url}\n`);
          NODE

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- \
            data/snapshots/dhs-uflpa-entity-list.html \
            data/snapshots/dhs-uflpa-source-url.txt; then
            echo "No DHS UFLPA snapshot changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/snapshots/dhs-uflpa-entity-list.html \
            data/snapshots/dhs-uflpa-source-url.txt
          git commit -m "Update DHS UFLPA snapshot"
          git push
