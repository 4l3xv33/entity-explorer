<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entity Explorer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div class="brand">
          <h1>Entity Explorer</h1>
          <p class="introText">Search entity lists through public APIs and machine-readable government sources. Not every entity list has been integrated yet.</p>
          <p id="statusText">Loading source registry...</p>
        </div>
        <button id="refreshButton" type="button">Refresh</button>
      </section>

      <div class="app-layout">
        <aside class="sources" aria-labelledby="sourcesHeading">
          <a class="policy-link" href="sira-policy.pdf" target="_blank" rel="noopener">
            <strong>Click this link to view SIRA PDF</strong>
          </a>
          <h2 id="sourcesHeading">Restricted Entity List Sources</h2>
          <div id="sourceList" class="source-list"></div>
        </aside>

        <div class="main-column">
          <section class="search-panel" aria-labelledby="searchHeading">
            <div class="search-head">
              <h2 id="searchHeading">Search</h2>
              <span id="recordCount">0 records</span>
            </div>
            <label class="search-box">
              <span>Query</span>
              <input id="searchInput" type="search" placeholder="Huawei, ZTE, Xinjiang, AVIC" autocomplete="off">
            </label>
            <div id="sourceFilters" class="filters"></div>
          </section>

          <section class="results" aria-live="polite">
            <div id="resultsList"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
